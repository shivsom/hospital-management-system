name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_HUB_USERNAME }}/hms

jobs:
  # ─────────────────────────────────────────
  # Job 1: Lint & Test Backend
  # ─────────────────────────────────────────
  test-backend:
    name: Test Backend (Java)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run backend tests
        working-directory: ./backend
        run: mvn test -q

  # ─────────────────────────────────────────
  # Job 2: Lint & Test Frontend
  # ─────────────────────────────────────────
  test-frontend:
    name: Test Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build frontend (smoke test)
        working-directory: ./frontend
        run: npm run build

  # ─────────────────────────────────────────
  # Job 3: Lint AI Service
  # ─────────────────────────────────────────
  test-ai:
    name: Test AI Service (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: ./ai-microservice
        run: pip install -r requirements.txt --quiet

      - name: Lint with flake8
        working-directory: ./ai-microservice
        run: |
          pip install flake8 --quiet
          flake8 main.py --max-line-length=120 --ignore=E501,W503

  # ─────────────────────────────────────────
  # Job 4: Build & Push Docker Images
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ai]
    # Only push on main branch, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build & push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push AI Service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-microservice
          file: ./ai-microservice/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-ai:latest
            ${{ env.IMAGE_PREFIX }}-ai:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────
  # Job 5: Deploy to VPS (SSH)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/hms
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployment complete at $(date)"
