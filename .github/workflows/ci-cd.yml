name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps: # Fixed: This must be indented under the job name
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Environment
        run: |
          docker version
          docker compose version

      - name: Build and Start containers
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          echo "Waiting for backend to be ready..."
          # This loop is more robust than a static sleep
          timeout 60s bash -c 'until curl --fail http://localhost:8080; do sleep 5; done'

      - name: Debug containers
        if: always() # Runs even if the previous step fails
        run: docker ps

      - name: Stop containers
        if: always()
        run: docker compose down
