# ─────────────────────────────────────────────────────────────
# Hospital Management System — Backend Configuration
# All secrets are injected via environment variables.
# Never hardcode credentials in this file.
# ─────────────────────────────────────────────────────────────

# ── Server ────────────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/api

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning (HikariCP defaults are good; tweak if needed)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# Disable SQL logging in production (set to true for local dev only)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── CORS ──────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost}

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── AI Service ────────────────────────────────────────────────
ai.service.url=${AI_SERVICE_URL:http://ai-service:8000}

# ── Actuator (health checks) ──────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# ── Logging ───────────────────────────────────────────────────
# Structured JSON logging for centralized log aggregation
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.com.hospital=INFO
# Disable verbose Spring Security debug logs in production
logging.level.org.springframework.security=WARN

# ── Dev auto-login (disabled — remove in production) ──────────
dev.autologin.enabled=false
