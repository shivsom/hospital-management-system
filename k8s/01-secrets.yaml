---
# ─────────────────────────────────────────────────────────────
# Secret — sensitive credentials
# ─────────────────────────────────────────────────────────────
# ⚠️  DO NOT commit real values to git.
#      Use `kubectl create secret generic hms-secrets --from-env-file=.env -n hms`
#      or use Sealed Secrets / External Secrets Operator in production.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: hms-secrets
  namespace: hms
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "CHANGE_ME"
  MYSQL_DATABASE:      "hms"
  MYSQL_USER:          "hmsuser"
  MYSQL_PASSWORD:      "CHANGE_ME"
  SPRING_DATASOURCE_USERNAME: "hmsuser"
  SPRING_DATASOURCE_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "REPLACE_WITH_BASE64_SECRET_MIN_512_BITS"
  JWT_EXPIRATION: "86400000"
