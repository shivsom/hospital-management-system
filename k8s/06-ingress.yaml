---
# ─────────────────────────────────────────────────────────────
# Ingress — nginx ingress controller routes traffic
# Requires: kubectl apply -f https://raw.githubusercontent.com/
#   kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/
#   provider/cloud/deploy.yaml
# ─────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hms-ingress
  namespace: hms
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size:       "15m"
    nginx.ingress.kubernetes.io/proxy-read-timeout:    "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout:    "120"
    nginx.ingress.kubernetes.io/limit-rps:             "30"
    # Uncomment for TLS with cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # Uncomment for TLS:
  # tls:
  #   - hosts:
  #       - yourdomain.com
  #     secretName: hms-tls-secret
  rules:
    - host: yourdomain.com   # ← replace with your domain or use _ for catch-all
      http:
        paths:
          # Backend API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8081
          # AI Microservice
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 8000
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
